<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#2563b8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Kollegen Bingo</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=1.8">
</head>
<body>
    <div class="container">
        <h1>🎉 Kollegen Bingo 🎉</h1>
        <p class="subtitle">Finde Kollegen für jede Frage und mache ein Foto!</p>

        <div class="bingo-grid" id="bingoGrid"></div>

        <div class="button-container">
            <button id="finalizeBtn" class="finalize-btn">
                🎊 Bingo Fertigstellen & Bild Erstellen 🎊
            </button>
            <button id="resetBtn" class="reset-btn">
                🔄 Neu Starten
            </button>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal" class="modal">
        <div class="modal-content camera-modal">
            <span class="close">&times;</span>
            <h2 id="modalQuestion"></h2>
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
                <button id="switchCameraBtn" class="switch-camera-btn" title="Kamera wechseln">🔄</button>
            </div>
            <canvas id="canvas" style="display:none;"></canvas>
            <button id="captureBtn" class="capture-btn">📸 Foto Machen</button>
        </div>
    </div>

    <!-- Hidden canvas for final image rendering -->
    <canvas id="finalCanvas" style="display:none;"></canvas>

    <script src="app.js?v=1.8"></script>
</body>
</html>
